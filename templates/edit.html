{% extends 'base.html' %}

{% block head %} 
    <title>Task Smask</title>
{% endblock %}

{% block body %}
    <div class="content">
            <h1>Update your task</h1>
            <form action="/edit/{{task.id}}" method="POST">
                <input type="text" name="content" id="{{task.content}}" value="{{task.content}}">
                <input type="submit" value="update">

            </form>
    </div>
{% endblock%}
